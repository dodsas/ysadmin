name: ysadmin

services:
  ysadmin:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/ysadmin:${IMAGE_TAG:-latest}
    container_name: ysadmin
    restart: always
    ports:
      - "${HOST_PORT:-6666}:6666"
    volumes:
      - ysadmin-data:/app/data:Z
    environment:
      PORT: 6666
      PING_INTERVAL_MS: ${PING_INTERVAL_MS:-600000}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6666/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  ysadmin-data:
