<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ysadmin · 관제 콘솔</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>ysadmin</h1>
      <nav class="tabs" role="tablist">
        <button class="tab is-active" role="tab" data-tab="keepalive" aria-selected="true">
          Keep-Alive 모니터
        </button>
        <button class="tab" role="tab" data-tab="placeholder" aria-selected="false">
          (추가 예정)
        </button>
      </nav>
    </header>

    <main>
      <section class="panel is-active" data-panel="keepalive">
        <div class="panel-head">
          <div>
            <h2>Keep-Alive 모니터</h2>
            <p class="panel-desc">
              render.com 무료 인스턴스가 15분 idle로 잠드는 것을 막기 위해 등록된 URL에
              주기적으로 GET 요청을 보냅니다. 응답이 정상이면 녹색, 실패하면 적색으로 표시됩니다.
            </p>
          </div>
          <button id="refresh-btn" class="btn btn-ghost" type="button">새로고침</button>
        </div>

        <form id="add-form" class="add-form" autocomplete="off">
          <input
            id="url-input"
            type="text"
            name="url"
            placeholder="https://my-service.onrender.com"
            required
          />
          <input id="label-input" type="text" name="label" placeholder="라벨 (선택)" />
          <button class="btn btn-primary" type="submit">추가</button>
        </form>

        <div id="targets" class="targets">
          <p class="empty">등록된 URL이 없습니다. 위 입력창에서 추가해주세요.</p>
        </div>
      </section>

      <section class="panel" data-panel="placeholder">
        <div class="placeholder">
          <h2>준비 중</h2>
          <p>여기에는 추가 기능이 들어갈 예정입니다.</p>
        </div>
      </section>
    </main>

    <template id="target-row">
      <article class="target">
        <div class="target-status" data-status>
          <span class="dot"></span>
          <span class="status-label"></span>
        </div>
        <div class="target-info">
          <div class="target-label" data-label></div>
          <a class="target-url" data-url target="_blank" rel="noreferrer"></a>
          <div class="target-meta" data-meta></div>
        </div>
        <div class="target-actions">
          <button class="btn btn-ghost" data-action="check" type="button">즉시 체크</button>
          <button class="btn btn-danger" data-action="delete" type="button">삭제</button>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
